name: "CodeQL Advanced"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: '21 15 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
    steps:
      - uses: globality-corp/terraform-github/shared_workflows/codeql@master
        with:
          language: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
